<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="40" height="40">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00bfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e90ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Letter K -->
  <g fill="none" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Vertical line -->
    <line x1="40" y1="20" x2="40" y2="100" />
    
    <!-- Top diagonal -->
    <line x1="40" y1="50" x2="100" y2="20" />
    
    <!-- Bottom diagonal -->
    <line x1="40" y1="50" x2="100" y2="100" />
  </g>
</svg>